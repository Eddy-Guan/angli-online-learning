<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/><title>首页 · 昂立教育</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#F05A22;--pl:#fde8e1;--p2:#ff7a45;--bg:#F5F5F7;--s:#FFF;--fg:#1d1d1f;--m2:#6e6e73;--m:#999;--b:#e8e8ed;--r:10px;--rl:12px;--f:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif}
body{font-family:var(--f);background:var(--bg);color:var(--fg);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.hd{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--s)}
.hd .logo{font-size:19px;font-weight:700;color:var(--fg);letter-spacing:-0.3px}
.hd .logo em{font-style:normal;color:var(--p)}
.hd-actions{display:flex;gap:16px;align-items:center}
.hd-actions button{background:none;border:none;padding:4px;cursor:pointer;color:var(--m2)}
.hd-actions button svg{display:block;width:22px;height:22px}
.banner{margin:12px 16px;background:linear-gradient(135deg,var(--p),var(--p2));border-radius:14px;padding:20px;color:#fff;position:relative;overflow:hidden}
.banner::after{content:'';position:absolute;top:-30px;right:-20px;width:100px;height:100px;background:rgba(255,255,255,.08);border-radius:50%}
.banner::before{content:'';position:absolute;bottom:-40px;right:30px;width:70px;height:70px;background:rgba(255,255,255,.06);border-radius:50%}
.banner h3{font-size:17px;font-weight:600;margin-bottom:4px;position:relative}
.banner p{font-size:13px;opacity:.85;margin-bottom:12px;position:relative}
.banner .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;background:rgba(255,255,255,.2);border-radius:20px;border:1px solid rgba(255,255,255,.35);color:#fff;font-size:12px;font-weight:500;text-decoration:none;position:relative;backdrop-filter:blur(4px)}
.banner .btn svg{width:14px;height:14px}
.sh{display:flex;justify-content:space-between;align-items:center;padding:16px 16px 10px}
.sh h3{font-size:16px;font-weight:600}
.sh a{font-size:12px;color:var(--m2);text-decoration:none;display:flex;align-items:center;gap:3px}
.sh a svg{width:12px;height:12px}
.qg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px;margin-bottom:4px}
.qf{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 6px;background:var(--s);border-radius:12px;border:1px solid var(--b);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .15s ease}
.qf:active{transform:scale(.95)}
.qf .ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.qf .ic svg{width:20px;height:20px}
.qf .ic.ic-1{background:#fde8e1;color:var(--p)}
.qf .ic.ic-2{background:#e8f5e9;color:#4caf50}
.qf .ic.ic-3{background:#fff3e0;color:#ff9800}
.qf .ic.ic-4{background:#e3f2fd;color:#2196f3}
.qf span{font-size:11px;font-weight:500;color:var(--fg)}
.hz{display:flex;overflow-x:auto;padding:0 16px;gap:10px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.hz::-webkit-scrollbar{display:none}
.cc{min-width:160px;max-width:180px;background:var(--s);border-radius:12px;border:1px solid var(--b);overflow:hidden;scroll-snap-align:start;flex-shrink:0}
.cc .ci{width:100%;height:80px;display:flex;align-items:center;justify-content:center}
.cc .ci svg{width:28px;height:28px}
.cc .ci.ci-math{background:linear-gradient(135deg,#fde8e1,#fef3ed)}
.cc .ci.ci-eng{background:linear-gradient(135deg,#e3f2fd,#eef5ff)}
.cc .ci.ci-phy{background:linear-gradient(135deg,#fff3e0,#fff8e6)}
.cc .ci.ci-chem{background:linear-gradient(135deg,#f3e5f5,#faf0fc)}
.cc .cc-body{padding:10px 12px 12px}
.cc h4{font-size:13px;font-weight:600;margin-bottom:2px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cc .mt{font-size:11px;color:var(--m2);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc .btm{display:flex;justify-content:space-between;align-items:center}
.cc .pr{font-size:14px;font-weight:700;color:var(--p)}
.cc .pr s{font-size:10px;color:var(--m);font-weight:400;margin-left:3px}
.cc .tg{display:inline-flex;align-items:center;gap:2px;padding:2px 6px;background:var(--pl);color:var(--p);border-radius:4px;font-size:10px;font-weight:500}
.cats{display:flex;gap:8px;padding:0 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cats::-webkit-scrollbar{display:none}
.cat{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--s);border-radius:20px;border:1px solid var(--b);font-size:12px;color:var(--fg);white-space:nowrap;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s ease;flex-shrink:0}
.cat:active{background:var(--pl);border-color:var(--p);color:var(--p)}
.bn{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;padding:6px 0 16px;background:var(--s);border-top:1px solid var(--b);z-index:100}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--m2);text-decoration:none;transition:color .15s;-webkit-tap-highlight-color:transparent;padding:2px 12px}
.ni svg{width:24px;height:24px;color:var(--m2);transition:color .15s}
.ni.on{color:var(--p)}
.ni.on svg{color:var(--p)}
.bn-spacer{height:80px}
</style></head><body>

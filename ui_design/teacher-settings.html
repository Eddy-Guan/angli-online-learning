<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/><title>教师设置 · 昂立教育</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#F05A22;--pl:#fde8e1;--p2:#ff7a45;--bg:#F5F5F7;--s:#FFF;--fg:#1d1d1f;--m2:#6e6e73;--m:#999;--b:#e8e8ed;--r:10px;--rl:12px;--f:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif}
body{font-family:var(--f);background:var(--bg);color:var(--fg);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
.hd{display:flex;align-items:center;padding:10px 16px;background:var(--s)}
.hd-back{display:flex;align-items:center;gap:4px;background:none;border:none;padding:4px 0;cursor:pointer;color:var(--fg);font-size:15px;-webkit-tap-highlight-color:transparent}
.hd-back svg{width:22px;height:22px}
.hd h1{flex:1;text-align:center;font-size:18px;font-weight:700;letter-spacing:-0.3px;margin-right:28px}

/* Avatar */
.av-sec{padding:24px 16px 12px;text-align:center;background:var(--s);margin-bottom:12px}
.av-sec .aw{position:relative;display:inline-block}
.av-sec .av{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;margin:0 auto;cursor:pointer}
.av-sec .av img{width:100%;height:100%;object-fit:cover}
.av-sec .av .ph{width:100%;height:100%;background:var(--pl);display:flex;align-items:center;justify-content:center;font-size:32px}
.av-sec .av-cam{position:absolute;bottom:0;right:-2px;width:28px;height:28px;background:var(--p);border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--s)}
.av-sec .av-cam svg{width:14px;height:14px;color:#fff}
input[type="file"]{display:none}

.def-av{display:flex;gap:10px;justify-content:center;padding:8px 16px 14px;background:var(--s)}
.def-av .da{width:44px;height:44px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.def-av .da.on{border-color:var(--p);box-shadow:0 0 0 3px var(--pl);transform:scale(1.08)}
.def-av .da:active{transform:scale(.92)}
.def-av .da.d1{background:#fde8e1}.def-av .da.d2{background:#e3f2fd}
.def-av .da.d3{background:#fff3e0}.def-av .da.d4{background:#e8f5e9}
.def-av .da.d5{background:#f3e5f5}.def-av .da.d6{background:#fce4ec}

/* Form */
.fm{padding:16px}
.sg{background:var(--s);border-radius:var(--rl);border:1px solid var(--b);overflow:hidden;margin-bottom:12px}
.sg-h{padding:14px 16px 10px;font-size:13px;font-weight:600;color:var(--fg);border-bottom:1px solid var(--b)}
.sg-b{padding:10px 16px 14px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fg:last-child{margin-bottom:0}
.fg label{font-size:12px;font-weight:600;color:var(--fg)}
.fg label .rq{color:#dc2626;margin-left:2px}
.fg .inp,.fg select{width:100%;padding:11px 14px;border:1px solid var(--b);border-radius:var(--r);background:var(--s);font-size:14px;color:var(--fg);font-family:var(--f);outline:none;transition:border-color .15s}
.fg .inp:focus,.fg select:focus{border-color:var(--p);box-shadow:0 0 0 2px var(--pl)}
.fg .inp::placeholder{color:var(--m2)}
.fg .inp[readonly]{background:var(--bg);color:var(--m2);cursor:default}

/* Tags */
.tags{margin-top:4px}
.tags .tg{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;background:var(--pl);color:var(--p);border-radius:6px;font-size:13px;font-weight:500;margin:0 6px 6px 0}
.tags .tg .del{width:16px;height:16px;border-radius:50%;background:var(--p);color:#fff;border:none;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;-webkit-tap-highlight-color:transparent}
.tags .tg-add{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:var(--s);color:var(--m2);border:1.5px dashed var(--b);border-radius:6px;font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tags .tg-add:active{background:var(--pl);color:var(--p);border-color:var(--p)}
.tg-hint{font-size:11px;color:var(--m2);margin-top:6px}
.tag-input-row{display:flex;gap:8px;margin-bottom:6px}
.tag-input-row input{flex:1;padding:9px 12px;border:1px solid var(--b);border-radius:var(--r);font-size:13px;font-family:var(--f);outline:none;max-width:120px;text-align:center}
.tag-input-row input:focus{border-color:var(--p)}
.tag-input-row .add-btn{padding:9px 14px;background:var(--pl);color:var(--p);border:1px solid var(--p);border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tag-input-row .add-btn:active{background:var(--p);color:#fff}

/* Preview */
.preview{padding:12px 16px;background:var(--s);border-radius:var(--rl);border:1px solid var(--b);margin-bottom:12px;display:flex;align-items:center;gap:12px}
.preview .pa{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--pl);font-size:20px;flex-shrink:0}
.preview .pb{flex:1}
.preview .pb .pn{font-size:14px;font-weight:600}
.preview .pb .pt{font-size:12px;color:var(--p);margin-top:2px}
.preview .pb .pt span{display:inline-block;padding:1px 6px;background:var(--pl);border-radius:4px;margin-right:4px;font-size:11px}

.btn-p{width:100%;padding:14px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border:none;border-radius:var(--rl);font-size:16px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.btn-p:active{opacity:.85}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.78);color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;z-index:999;display:none;text-align:center;pointer-events:none}
</style></head><body>

<div class="hd">
  <button class="hd-back" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
  </button>
  <h1>教师设置</h1>
</div>

<!-- Avatar -->
<div class="av-sec">
  <div class="aw">
    <div class="av" id="avatarPreview" onclick="document.getElementById('fileInput').click()">
      <div class="ph" id="avatarPlaceholder">👨‍🏫</div>
    </div>
    <div class="av-cam">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </div>
    <input type="file" id="fileInput" accept="image/*" onchange="handleUpload(this)"/>
  </div>
</div>

<div class="def-av">
  <div class="da d1 on" onclick="selectDefault(this)">👨‍🏫</div>
  <div class="da d2" onclick="selectDefault(this)">👩‍🏫</div>
  <div class="da d3" onclick="selectDefault(this)">🧑‍🏫</div>
  <div class="da d4" onclick="selectDefault(this)">👨‍💼</div>
  <div class="da d5" onclick="selectDefault(this)">👩‍💼</div>
  <div class="da d6" onclick="selectDefault(this)">🧑‍💼</div>
</div>

<!-- Live Preview -->
<div class="preview">
  <div class="pa" id="previewAvatar">👨‍🏫</div>
  <div class="pb">
    <div class="pn" id="previewName">张伟老师</div>
    <div class="pt" id="previewTags"><span>数学</span><span>金牌讲师</span><span>教龄8年</span></div>
  </div>
</div>

<div class="fm">
  <div class="sg">
    <div class="sg-h">基本信息</div>
    <div class="sg-b">
      <div class="fg">
        <label>真实姓名 <span class="rq">*</span></label>
        <input class="inp" id="teacherName" value="张伟" placeholder="请输入姓名" oninput="updatePreview()"/>
      </div>
      <div class="fg">
        <label>出生日期</label>
        <input class="inp" type="date" id="teacherBirth" value="1990-05-15"/>
      </div>
      <div class="fg">
        <label>手机号 <span class="rq">*</span></label>
        <input class="inp" type="tel" id="teacherPhone" value="138****8888" placeholder="请输入手机号" maxlength="11" readonly/>
        <div style="font-size:11px;color:var(--m2);margin-top:1px">如需换绑手机号，请联系管理员</div>
      </div>
    </div>
  </div>

  <div class="sg">
    <div class="sg-h">个人标签 <span style="font-size:11px;color:var(--m2);font-weight:400">（展示在教师主页，最多3个，每个限4字）</span></div>
    <div class="sg-b">
      <div class="tags" id="tagContainer">
        <span class="tg" data-idx="0">数学 <button class="del" onclick="removeTag(0)">✕</button></span>
        <span class="tg" data-idx="1">金牌讲师 <button class="del" onclick="removeTag(1)">✕</button></span>
        <span class="tg" data-idx="2">教龄8年 <button class="del" onclick="removeTag(2)">✕</button></span>
        <span class="tg-add" id="tagAddBtn" onclick="showTagInput()">+ 添加标签</span>
      </div>
      <div id="tagInputRow" style="display:none" class="tag-input-row">
        <input type="text" id="tagInput" maxlength="4" placeholder="如：奥数教练" oninput="this.value=this.value.slice(0,4)"/>
        <button class="add-btn" onclick="addTag()">添加</button>
        <button class="add-btn" style="background:var(--s);color:var(--m2);border-color:var(--b)" onclick="hideTagInput()">取消</button>
      </div>
      <div class="tg-hint">示例：奥数教练、优秀教师、985硕士、10年教龄、竞赛辅导…</div>
    </div>
  </div>

  <button class="btn-p" onclick="doSave()">保存修改</button>
</div>

<div class="toast" id="toast"></div>

<script>
var tags = ["数学", "金牌讲师", "教龄8年"];
var previewEmoji = "👨‍🏫";

function toast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.style.display="block";
  setTimeout(function(){t.style.display="none"},1600);
}

function handleUpload(input){
  var file=input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    document.getElementById("avatarPreview").innerHTML='<img src="'+e.target.result+'" alt="头像"/>';
    document.querySelectorAll(".da").forEach(function(d){d.classList.remove("on")});
    document.getElementById("previewAvatar").innerHTML='<img src="'+e.target.result+'" style="width:44px;height:44px;border-radius:50%;object-fit:cover"/>';
  };
  reader.readAsDataURL(file);
}

function selectDefault(el){
  document.querySelectorAll(".da").forEach(function(d){d.classList.remove("on")});
  el.classList.add("on");
  previewEmoji = el.textContent.trim();
  document.getElementById("avatarPlaceholder").textContent = previewEmoji;
  document.getElementById("previewAvatar").textContent = previewEmoji;
}

function updatePreview(){
  var name = document.getElementById("teacherName").value.trim() || "老师";
  document.getElementById("previewName").textContent = name + "老师";
  renderTags();
}

function renderTags(){
  var container = document.getElementById("tagContainer");
  var html = "";
  for(var i=0;i<tags.length;i++){
    html += '<span class="tg" data-idx="'+i+'">'+tags[i]+' <button class="del" onclick="removeTag('+i+')">✕</button></span>';
  }
  if(tags.length < 3){
    html += '<span class="tg-add" id="tagAddBtn" onclick="showTagInput()">+ 添加标签</span>';
  }
  container.innerHTML = html;

  // Update preview
  var pt = document.getElementById("previewTags");
  pt.innerHTML = tags.map(function(t){ return "<span>"+t+"</span>"; }).join("");
  if(tags.length === 0){
    pt.textContent = "暂无标签";
    pt.style.color = "#999";
  } else {
    pt.style.color = "";
  }
}

function showTagInput(){
  document.getElementById("tagInputRow").style.display = "flex";
  document.getElementById("tagInput").value = "";
  document.getElementById("tagInput").focus();
  var btn = document.getElementById("tagAddBtn");
  if(btn) btn.style.display = "none";
}

function hideTagInput(){
  document.getElementById("tagInputRow").style.display = "none";
  var btn = document.getElementById("tagAddBtn");
  if(btn) btn.style.display = "inline-flex";
}

function addTag(){
  var val = document.getElementById("tagInput").value.trim();
  if(!val){ toast("请输入标签内容"); return; }
  if(val.length > 4){ toast("每个标签不超过4个字"); return; }
  if(tags.length >= 3){ toast("最多只能添加3个标签"); return; }
  tags.push(val);
  hideTagInput();
  renderTags();
  toast("已添加标签：「"+val+"」");
}

function removeTag(idx){
  tags.splice(idx, 1);
  renderTags();
}

function doSave(){
  var name = document.getElementById("teacherName").value.trim();
  var phone = document.getElementById("teacherPhone").value.trim();
  if(!name){ toast("请输入姓名"); return; }
  if(name.length > 10){ toast("姓名过长"); return; }
  // Save to localStorage for screens_teacher to read
  var data = {
    name: name + "老师",
    tags: tags,
    avatar: previewEmoji
  };
  localStorage.setItem("teacherSettings", JSON.stringify(data));
  toast("保存成功！标签已更新");
}
</script>
</body></html>

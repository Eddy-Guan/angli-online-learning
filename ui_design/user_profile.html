<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#F05A22;--pl:#fde8e1;--p2:#ff7a45;--bg:#F5F5F7;--s:#FFF;--fg:#1d1d1f;--m2:#6e6e73;--m:#999;--b:#e8e8ed;--r:10px;--rl:12px;--f:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif}
body{font-family:var(--f);background:var(--bg);color:var(--fg);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.hd{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--s)}
.hd h1{font-size:19px;font-weight:700;letter-spacing:-0.3px}
.hd-actions{display:flex;gap:16px;align-items:center}
.hd-actions button{background:none;border:none;padding:4px;cursor:pointer;color:var(--m2)}
.hd-actions button svg{display:block;width:22px;height:22px}
.profile{background:var(--s);padding:20px 16px;display:flex;gap:14px;align-items:center}
.av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--pl);color:var(--p);flex-shrink:0}
.av svg{width:28px;height:28px}
.pi h2{font-size:18px;font-weight:700}
.pi p{font-size:12px;color:var(--m2);margin-top:1px;display:flex;align-items:center;gap:4px}
.pi p svg{width:12px;height:12px}
.stats{display:flex;background:var(--s);border-top:1px solid var(--b);padding:2px 0}
.st{flex:1;text-align:center;padding:14px 0;border-right:1px solid var(--b)}
.st:last-child{border-right:none}
.st .n{font-size:20px;font-weight:700;color:var(--p)}
.st .l{font-size:11px;color:var(--m2);margin-top:2px}
.mg{background:var(--s);margin-top:12px;border-top:1px solid var(--b);border-bottom:1px solid var(--b)}
.mi{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--b);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
.mi:last-child{border-bottom:none}
.mi:active{background:#fafafa}
.mi .ic{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mi .ic svg{width:18px;height:18px}
.mi .ic.ic-o{background:#fde8e1;color:var(--p)}
.mi .ic.ic-c{background:#fff3e0;color:#ff9800}
.mi .ic.ic-h{background:#fce4ec;color:#e91e63}
.mi .ic.ic-b{background:#e3f2fd;color:#2196f3}
.mi .ic.ic-n{background:#e8f5e9;color:#4caf50}
.mi .ic.ic-k{background:#fff3e0;color:#ff9800}
.mi .ic.ic-s{background:#f3e5f5;color:#9c27b0}
.mi .lb{flex:1;font-size:14px;font-weight:500}
.mi .bd{padding:2px 7px;background:var(--p);color:#fff;border-radius:10px;font-size:10px;font-weight:600;min-width:18px;text-align:center}
.mi .ar{color:var(--m2);flex-shrink:0;display:flex}
.mi .ar svg{width:16px;height:16px}
.logout{margin:20px 16px;padding:12px;text-align:center;background:var(--s);border:1px solid var(--b);border-radius:12px;color:#dc2626;font-size:14px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent}
.logout:active{background:#fef2f2}
.bn{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;padding:6px 0 16px;background:var(--s);border-top:1px solid var(--b);z-index:100}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--m2);text-decoration:none;transition:color .15s;-webkit-tap-highlight-color:transparent;padding:2px 12px}
.ni svg{width:24px;height:24px;color:var(--m2);transition:color .15s}
.ni.on{color:var(--p)}
.ni.on svg{color:var(--p)}
.bn-spacer{height:80px}
</style></head><body>

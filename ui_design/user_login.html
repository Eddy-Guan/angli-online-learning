<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/><title>登录 · 昂立教育</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#F05A22;--pl:#fde8e1;--p2:#ff7a45;--bg:#F5F5F7;--s:#FFF;--fg:#1d1d1f;--m2:#6e6e73;--m:#999;--b:#e8e8ed;--r:10px;--rl:12px;--f:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif}
body{font-family:var(--f);background:var(--bg);color:var(--fg);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.hd{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--s)}
.hd .logo{font-size:19px;font-weight:700;color:var(--fg);letter-spacing:-0.3px}
.hd .logo em{font-style:normal;color:var(--p)}
.hd-actions{display:flex;gap:16px;align-items:center}
.hd-actions button{background:none;border:none;padding:4px;cursor:pointer;color:var(--m2)}

/* Hero area */
.hero{padding:30px 16px 20px;text-align:center}
.hero .ic{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--p),var(--p2));display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.hero .ic svg{width:32px;height:32px;color:#fff}
.hero h2{font-size:22px;font-weight:700;margin-bottom:4px}
.hero p{font-size:13px;color:var(--m2)}

/* Tab bar */
.tb{display:flex;margin:0 16px;background:var(--s);border-radius:10px;border:1px solid var(--b);overflow:hidden}
.tb-i{flex:1;text-align:center;padding:10px 0;font-size:14px;font-weight:500;color:var(--m2);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s}
.tb-i.on{background:var(--p);color:#fff;font-weight:600}
.tb-i:not(.on):active{background:var(--pl);color:var(--p)}

/* Form */
.fm{display:none;padding:16px;flex:1}
.fm.show{display:block}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.fg label{font-size:12px;font-weight:600;color:var(--fg)}
.fg label .rq{color:#dc2626;margin-left:2px}
.fg .inp,.fg select{width:100%;padding:12px 14px;border:1px solid var(--b);border-radius:var(--r);background:var(--s);font-size:14px;color:var(--fg);font-family:var(--f);outline:none;transition:border-color .15s}
.fg .inp:focus,.fg select:focus{border-color:var(--p);box-shadow:0 0 0 2px var(--pl)}
.fg .inp::placeholder{color:var(--m2)}
.fg .inp.err{border-color:#dc2626}
.fg .hint{font-size:11px;color:var(--m2);margin-top:2px}

/* Phone + code row */
.pc{display:flex;gap:8px}
.pc .inp{flex:1}
.pc .code-btn{padding:12px 14px;background:var(--pl);color:var(--p);border:1px solid var(--p);border-radius:var(--r);font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s}
.pc .code-btn:active{background:var(--p);color:#fff}
.pc .code-btn:disabled{background:var(--b);color:var(--m2);border-color:var(--b);cursor:default}

/* Identity selector */
.id-g{display:flex;gap:10px}
.id-g .id-i{flex:1;padding:14px;border:2px solid var(--b);border-radius:var(--rl);text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s}
.id-g .id-i:active{transform:scale(.97)}
.id-g .id-i.on{border-color:var(--p);background:var(--pl)}
.id-g .id-i .ic{font-size:28px;margin-bottom:4px;display:block}
.id-g .id-i .lb{font-size:13px;font-weight:600;color:var(--fg)}
.id-g .id-i .sub{font-size:11px;color:var(--m2);margin-top:2px}

/* Submit button */
.btn-p{width:100%;padding:14px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border:none;border-radius:var(--rl);font-size:16px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.btn-p:active{opacity:.85}

/* Links */
.links{display:flex;justify-content:space-between;padding:16px 0}
.links a{font-size:13px;color:var(--p);text-decoration:none}
.links a:active{opacity:.7}

/* Footer */
.ft{text-align:center;padding:20px 16px 30px;font-size:11px;color:var(--m2)}
.ft a{color:var(--m2);text-decoration:none}
</style></head><body>

<div class="hd"><span class="logo"><em>昂立</em>教育</span><div class="hd-actions"><button aria-label="关闭" onclick="window.close()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div></div>

<div class="hero">
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>
  <h2>欢迎来到昂立教育</h2>
  <p>登录后查看课程、作业和学习报告</p>
</div>

<div class="tb" id="mainTabs">
  <div class="tb-i on" data-tab="0" onclick="switchMain(this,0)">登录</div>
  <div class="tb-i" data-tab="1" onclick="switchMain(this,1)">注册</div>
</div>

<!-- ===== Login Form ===== -->
<div class="fm show" id="formLogin">
  <div class="fg">
    <label>手机号 <span class="rq">*</span></label>
    <input class="inp" type="tel" id="loginPhone" placeholder="请输入手机号" maxlength="11"/>
  </div>
  <div class="fg">
    <label>密码 <span class="rq">*</span></label>
    <input class="inp" type="password" id="loginPwd" placeholder="请输入密码"/>
  </div>
  <div class="links">
    <a href="#" onclick="showForgot();return false">忘记密码？</a>
    <a href="#" onclick="switchMain(document.querySelector('.tb-i[data-tab="1"]'),1);return false">没有账号？去注册</a>
  </div>
  <button class="btn-p" onclick="doLogin()">登 录</button>
  <div class="ft">登录即表示同意 <a href="#">《用户协议》</a> 和 <a href="#">《隐私政策》</a></div>
</div>

<!-- ===== Register Form ===== -->
<div class="fm" id="formRegister">
  <div class="fg">
    <label>真实姓名 <span class="rq">*</span></label>
    <input class="inp" id="regName" placeholder="请输入真实姓名"/>
  </div>
  <div class="fg">
    <label>手机号 <span class="rq">*</span></label>
    <div class="pc">
      <input class="inp" type="tel" id="regPhone" placeholder="请输入手机号" maxlength="11"/>
      <button class="code-btn" id="codeBtn" onclick="sendCode(this)">获取验证码</button>
    </div>
  </div>
  <div class="fg">
    <label>短信验证码 <span class="rq">*</span></label>
    <input class="inp" id="regCode" placeholder="请输入短信验证码" maxlength="6" style="max-width:160px"/>
  </div>
  <div class="fg">
    <label>设置密码 <span class="rq">*</span></label>
    <input class="inp" type="password" id="regPwd" placeholder="至少6位字母+数字组合"/>
    <div class="hint">至少6位，建议包含字母和数字</div>
  </div>
  <div class="fg">
    <label>身份 <span class="rq">*</span></label>
    <div class="id-g">
      <div class="id-i on" data-role="parent" onclick="selectRole(this)">
        <span class="ic">👨‍👩‍👧‍👦</span>
        <div class="lb">家长</div>
        <div class="sub">查看孩子学习情况</div>
      </div>
      <div class="id-i" data-role="teacher" onclick="selectRole(this)">
        <span class="ic">👩‍🏫</span>
        <div class="lb">老师</div>
        <div class="sub">管理课程和学生</div>
      </div>
    </div>
  </div>
  <button class="btn-p" onclick="doRegister()">注 册</button>
  <div class="ft">注册即表示同意 <a href="#">《用户协议》</a> 和 <a href="#">《隐私政策》</a></div>
</div>

<!-- ===== Forgot Password Form ===== -->
<div class="fm" id="formForgot">
  <div class="fg">
    <label>手机号 <span class="rq">*</span></label>
    <div class="pc">
      <input class="inp" type="tel" id="fPwdPhone" placeholder="请输入注册手机号" maxlength="11"/>
      <button class="code-btn" id="codeBtn2" onclick="sendCode(this)">获取验证码</button>
    </div>
  </div>
  <div class="fg">
    <label>短信验证码 <span class="rq">*</span></label>
    <input class="inp" id="fPwdCode" placeholder="请输入短信验证码" maxlength="6" style="max-width:160px"/>
  </div>
  <div class="fg">
    <label>新密码 <span class="rq">*</span></label>
    <input class="inp" type="password" id="fPwdNew" placeholder="请输入新密码"/>
    <div class="hint">至少6位，建议包含字母和数字</div>
  </div>
  <button class="btn-p" onclick="doResetPwd()" style="margin-top:6px">重置密码</button>
  <div class="links" style="justify-content:center">
    <a href="#" onclick="showLogin();return false">返回登录</a>
  </div>
</div>

<style>
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.shake{animation:shake .3s ease}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.78);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:999;display:none;text-align:center;max-width:260px}
</style>
<div class="toast" id="toast"></div>

<script>
function toast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.style.display="block";
  setTimeout(function(){t.style.display="none"},2000);
}

function switchMain(el,idx){
  document.querySelectorAll(".tb-i").forEach(function(d){d.classList.remove("on")});
  el.classList.add("on");
  document.querySelectorAll(".fm").forEach(function(f){f.classList.remove("show")});
  var forms=["formLogin","formRegister","formForgot"];
  document.getElementById(forms[idx]).classList.add("show");
}

function showForgot(){
  document.querySelectorAll(".tb-i").forEach(function(d){d.classList.remove("on")});
  document.querySelectorAll(".fm").forEach(function(f){f.classList.remove("show")});
  document.getElementById("formForgot").classList.add("show");
}

function showLogin(){
  document.querySelectorAll(".tb-i").forEach(function(d){d.classList.remove("on")});
  document.querySelectorAll(".fm").forEach(function(f){f.classList.remove("show")});
  document.querySelector('.tb-i[data-tab="0"]').classList.add("on");
  document.getElementById("formLogin").classList.add("show");
}

function selectRole(el){
  document.querySelectorAll(".id-i").forEach(function(d){d.classList.remove("on")});
  el.classList.add("on");
}

var codeTimers={};
function sendCode(btn){
  var val=btn.textContent;
  if(val.indexOf("s")>0||btn.disabled)return;
  var phone="";
  var parent=btn.parentElement;
  var inp=parent.querySelector(".inp");
  if(inp)phone=inp.value.trim();
  if(phone.length!==11){toast("请输入正确的手机号");return;}
  btn.disabled=true;
  var sec=60;
  btn.textContent=sec+"s";
  codeTimers[btn.id]=setInterval(function(){
    sec--;
    if(sec<=0){
      clearInterval(codeTimers[btn.id]);
      btn.disabled=false;
      btn.textContent="重新获取";
    }else{
      btn.textContent=sec+"s";
    }
  },1000);
  toast("验证码已发送至 "+phone.substr(0,3)+"****"+phone.substr(7));
}

function doLogin(){
  var phone=document.getElementById("loginPhone").value.trim();
  var pwd=document.getElementById("loginPwd").value;
  if(!phone||!pwd){toast("请填写手机号和密码");return;}
  if(phone.length!==11){toast("手机号格式不正确");return;}
  toast("登录成功，正在跳转...");
}

function doRegister(){
  var name=document.getElementById("regName").value.trim();
  var phone=document.getElementById("regPhone").value.trim();
  var code=document.getElementById("regCode").value.trim();
  var pwd=document.getElementById("regPwd").value;
  if(!name||!phone||!code||!pwd){toast("请填写所有必填项");return;}
  if(phone.length!==11){toast("手机号格式不正确");return;}
  if(pwd.length<6){toast("密码至少6位");return;}
  var role=document.querySelector(".id-i.on");
  if(!role){toast("请选择身份");return;}
  toast("注册成功！请登录");
  setTimeout(function(){showLogin();document.getElementById("loginPhone").value=phone;},1500);
}

function doResetPwd(){
  var phone=document.getElementById("fPwdPhone").value.trim();
  var code=document.getElementById("fPwdCode").value.trim();
  var pwd=document.getElementById("fPwdNew").value;
  if(!phone||!code||!pwd){toast("请填写所有字段");return;}
  if(phone.length!==11){toast("手机号格式不正确");return;}
  if(pwd.length<6){toast("密码至少6位");return;}
  toast("密码重置成功！请登录");
  setTimeout(function(){showLogin();document.getElementById("loginPhone").value=phone;},1500);
}
</script>
</body></html>

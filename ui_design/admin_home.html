<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>首页 · 昂立教育</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#F05A22;--pl:#fde8e1;--p2:#ff7a45;--bg:#F5F5F7;--s:#FFF;--fg:#1d1d1f;--m2:#6e6e73;--m:#999;--b:#e8e8ed;--r:10px;--rl:12px;--f:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif}
body{font-family:var(--f);background:var(--bg);color:var(--fg);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.hd{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--s)}
.hd .logo{font-size:19px;font-weight:700;color:var(--fg);letter-spacing:-0.3px}
.hd .logo em{font-style:normal;color:var(--p)}
.hd-r{display:flex;align-items:center;gap:12px}
.hd-r span{width:30px;height:30px;border-radius:50%;background:var(--pl);display:flex;align-items:center;justify-content:center;color:var(--p);font-weight:700;font-size:11px}
.hd-r .lg-out{padding:5px 10px;background:none;color:var(--m2);border:1px solid var(--b);border-radius:6px;font-size:11px}
.tb{display:flex;background:var(--s);border-bottom:1px solid var(--b);gap:0}
.tb-i{flex:1;text-align:center;padding:10px 0;font-size:12px;color:var(--m2);border-bottom:2px solid transparent;transition:all .15s}
.tb-i.on{color:var(--p);border-bottom-color:var(--p);font-weight:600}
.tb-i svg{display:block;width:20px;height:20px;margin:0 auto 2px}
.tb-i.on svg{color:var(--p)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;padding:0 16px}
.sc{background:var(--s);border-radius:var(--rl);border:1px solid var(--b);padding:16px}
.sc .l{font-size:11px;color:var(--m2);margin-bottom:2px}
.sc .v{font-size:24px;font-weight:700;color:var(--fg)}
.sc .c{font-size:11px;color:#34c759;margin-top:2px}
.sc .c.down{color:#ff4d4d}
.sc .sc-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.sc .sc-icon svg{width:18px;height:18px}
.sc .sc-icon.i1{background:var(--pl);color:var(--p)}
.sc .sc-icon.i2{background:#e3f2fd;color:#2196f3}
.sc .sc-icon.i3{background:#fff3e0;color:#ff9800}
.sc .sc-icon.i4{background:#e8f5e9;color:#4caf50}
.sc-icon.i5{background:#f3e5f5;color:#9c27b0}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 16px}
.sh h3{font-size:15px;font-weight:600}
.sh a{font-size:12px;color:var(--m2);text-decoration:none}
.qa{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;padding:0 16px}
.qa-i{padding:14px 6px;background:var(--s);border-radius:var(--r);border:1px solid var(--b);text-align:center;transition:transform .1s}
.qa-i .ic{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin:0 auto 4px}
.qa-i .ic svg{width:16px;height:16px}
.qa-i .ic.q1{background:var(--pl);color:var(--p)}
.qa-i .ic.q2{background:#e3f2fd;color:#2196f3}
.qa-i .ic.q3{background:#fff3e0;color:#ff9800}
.qa-i .ic.q4{background:#e8f5e9;color:#4caf50}
.qa-i span{font-size:11px;color:var(--fg);font-weight:500}
.li{background:var(--s);border-radius:var(--r);border:1px solid var(--b);margin-bottom:8px;padding:12px;display:flex;align-items:center;gap:10px}
.li .lt{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.li .lt.t1{background:var(--pl)}
.li .lt.t2{background:#e3f2fd}
.li .lt.t3{background:#fff3e0}
.li .lt.t4{background:#fce4ec}
.li .lb{flex:1;min-width:0}
.li .lb h4{font-size:13px;font-weight:600;margin-bottom:1px}
.li .lb p{font-size:11px;color:var(--m2)}
.li .lr{text-align:right}
.li .lr .st{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
.li .lr .st.s1{background:var(--pl);color:var(--p)}
.li .lr .st.s2{background:#e8f5e9;color:#4caf50}
.li .lr .st.s3{background:#fce4ec;color:#e91e63}
.li .lr .st.s4{background:var(--bg);color:var(--m2)}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;background:#dc2626;color:#fff;border-radius:9px;font-size:10px;font-weight:600}
.tl{background:var(--s);border-radius:var(--rl);border:1px solid var(--b);overflow:hidden;margin:0 16px 14px}
.tl-h{display:flex;justify-content:space-between;padding:14px 14px 8px;font-size:13px;font-weight:600}
.tl-r{display:flex;padding:10px 14px;border-top:1px solid var(--b);align-items:center;gap:8px}
.tl-r .td{flex:1;font-size:12px}
.tl-r .td.s{flex:0 0 50px;text-align:center;font-size:11px;color:var(--m2)}
.rv-c{background:var(--s);border-radius:var(--rl);border:1px solid var(--b);overflow:hidden;margin:0 16px 10px}
.rv-h{display:flex;align-items:center;gap:10px;padding:14px}
.rv-h .ri{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--pl);font-size:16px;flex-shrink:0}
.rv-h .rb{flex:1}
.rv-h .rb h4{font-size:13px;font-weight:600}
.rv-h .rb p{font-size:11px;color:var(--m2);margin-top:1px}
.rv-b{padding:0 14px 14px;display:flex;gap:6px;flex-wrap:wrap}
.rv-b .t{padding:4px 10px;border-radius:4px;font-size:11px;background:var(--pl);color:var(--p);border:none;font-weight:500}
.rv-b .t.g{background:#e8f5e9;color:#4caf50}
.rv-b .t.r{background:#fce4ec;color:#e91e63}
.empty{padding:40px 16px;text-align:center;font-size:13px;color:var(--m2)}
.pc{display:flex;align-items:center;gap:14px;margin:12px 16px;background:var(--s);border-radius:var(--rl);border:1px solid var(--b);padding:20px 16px}
.pc-av{width:52px;height:52px;border-radius:50%;background:var(--pl);display:flex;align-items:center;justify-content:center;color:var(--p);font-size:22px;font-weight:700;flex-shrink:0}
.pc-info h3{font-size:17px;font-weight:700}
.pc-info p{font-size:12px;color:var(--m2);margin-top:2px}
.lg-btn{margin:14px 16px;padding:12px 0;width:calc(100% - 32px);background:var(--s);border:1px solid var(--b);border-radius:var(--rl);color:#dc2626;font-size:14px;font-weight:500;text-align:center}
.ver{text-align:center;padding:12px 0;font-size:11px;color:var(--m2)}
</style>
</head>
<body>
<div class="hd">
  <span class="logo"><em>昂立</em>管理</span>
  <div class="hd-r">
    <button class="lg-out">退出</button>
    <span>管</span>
  </div>
</div>
<div class="tb">
<div class="tb-i on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>首页</div>
<div class="tb-i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><path d="M21.5 12a9.5 9.5 0 1 1-19 0 9.5 9.5 0 0 1 19 0z"/></svg>审核 <span class="badge">3</span></div>
<div class="tb-i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>内容</div>
<div class="tb-i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>我的</div>
</div>
<div class="sg">
    <div class="sc"><div class="sc-icon i1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div class="l">总注册用户</div><div class="v">8,642</div><div class="c">&uarr; 226 本月</div></div>
    <div class="sc"><div class="sc-icon i2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div class="l">本月营收</div><div class="v">&yen;186,200</div><div class="c">&uarr; 15.6%</div></div>
    <div class="sc"><div class="sc-icon i3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div><div class="l">平均评分</div><div class="v">4.8</div><div class="c">&uarr; 0.1</div></div>
    <div class="sc"><div class="sc-icon i4"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div class="l">在职教师</div><div class="v">48</div><div class="c">&uarr; 3人</div></div>
    <div class="sc"><div class="sc-icon i5"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div class="l">服务学生</div><div class="v">7,862</div><div class="c">&uarr; 189人</div></div>
  </div>
  <div class="sh"><h3>快捷操作</h3></div>
  <div class="qa">
    <div class="qa-i"><div class="ic q1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/></svg></div><span>待审核</span></div>
    <div class="qa-i"><div class="ic q2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div><span>发布课程</span></div>
    <div class="qa-i"><div class="ic q3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div><span>课程管理</span></div>
    <div class="qa-i"><div class="ic q4"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><span>用户管理</span></div>
  </div>
  <div class="sh"><h3>待处理事项</h3></div>
  <div class="li" style="margin:0 16px 8px"><div class="lt t1">&check;</div><div class="lb"><h4>课程审核</h4><p>张伟老师提交了"初一数学·思维训练班"</p></div><div class="lr"><span class="st s1">待审核</span></div></div>
  <div class="li" style="margin:0 16px 8px"><div class="lt t2">&#x1F4DD;</div><div class="lb"><h4>教师入驻</h4><p>李芳老师完成了实名认证，等待审核</p></div><div class="lr"><span class="st s1">待审核</span></div></div>
  <div class="li" style="margin:0 16px 8px"><div class="lt t3">&#x1F4B0;</div><div class="lb"><h4>提现申请</h4><p>3位教师申请提现，共计 &yen;12,800</p></div><div class="lr"><span class="st s4">待处理</span></div></div>
</body>
</html>

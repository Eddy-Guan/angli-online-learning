server:
  port: 8080

spring:
  application:
    name: angli-online

  datasource:
    url: jdbc:mysql://localhost:3306/angli_online?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-underline: true

jwt:
  secret: angli_online_secret_key_2024
  expire: 86400000

logging:
  level:
    com.angli.online: debug
    org.springframework.security: info
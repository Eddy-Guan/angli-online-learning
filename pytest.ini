[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short -q
markers =
    auth: 认证相关测试
    admin: 管理员接口测试
    course: 课程接口测试
    teacher: 教师接口测试
    student: 学生接口测试
    order: 订单接口测试
    evaluation: 评价接口测试
    checkin: 签到接口测试
    integration: 集成测试
    smoke: 冒烟测试
    unit: 单元测试
    skip_server_check: 跳过服务器检查
log_format = %(asctime)s %(levelname)s %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
htmlpath = reports/test_report.html
html_title = 昂立在线教育平台 - API测试报告
html_show_failed = true
html_show_passed = true
html_show_skipped = true
